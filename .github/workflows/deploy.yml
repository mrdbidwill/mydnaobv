name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "alembic/**"
      - "scripts/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".env.example"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run pytest on the server during deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Preflight Config Check
        id: preflight
        shell: bash
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_ALERT_FORMAT: ${{ vars.DEPLOY_ALERT_FORMAT }}
          DEPLOY_ALERT_NTFY_BASE_URL: ${{ vars.DEPLOY_ALERT_NTFY_BASE_URL }}
          DEPLOY_ALERT_WEBHOOK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK_URL }}
          DEPLOY_ALERT_WEBHOOK_FALLBACK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK_FALLBACK_URL }}
        run: |
          set -euo pipefail
          enabled="$(printf '%s' "${DEPLOY_ENABLED:-false}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${enabled}" != "true" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=Auto-deploy disabled (set repository variable DEPLOY_ENABLED=true to enable)." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=()
          [[ -z "${DEPLOY_HOST:-}" ]] && missing+=("DEPLOY_HOST (secret)")
          [[ -z "${DEPLOY_USER:-}" ]] && missing+=("DEPLOY_USER (secret)")
          [[ -z "${DEPLOY_SSH_KEY:-}" ]] && missing+=("DEPLOY_SSH_KEY (secret)")

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=Missing required deploy configuration: ${missing[*]}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          invalid=()
          deploy_alert_format="$(printf '%s' "${DEPLOY_ALERT_FORMAT:-plain}" | tr '[:upper:]' '[:lower:]')"
          deploy_alert_ntfy_base_url="${DEPLOY_ALERT_NTFY_BASE_URL:-https://ntfy.sh}"
          deploy_alert_ntfy_base_url="${deploy_alert_ntfy_base_url%/}"
          validate_alert_url_secret() {
            local name="$1"
            local value="$2"
            value="${value//$'\r'/}"
            value="$(printf '%s' "${value}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            if [[ -z "${value}" ]]; then
              return 0
            fi
            if [[ "${value}" =~ [[:space:]] ]]; then
              invalid+=("${name} contains whitespace")
              return 0
            fi
            if [[ "${value}" =~ ^https?:// ]]; then
              return 0
            fi
            if [[ "${deploy_alert_format}" == "ntfy" && "${value}" =~ ^[A-Za-z0-9._~-]+$ && "${deploy_alert_ntfy_base_url}" =~ ^https?:// ]]; then
              return 0
            fi
            if [[ ! "${value}" =~ ^https?:// ]]; then
              invalid+=("${name} must start with http:// or https://")
            fi
          }

          validate_alert_url_secret "DEPLOY_ALERT_WEBHOOK_URL (secret)" "${DEPLOY_ALERT_WEBHOOK_URL:-}"
          validate_alert_url_secret "DEPLOY_ALERT_WEBHOOK_FALLBACK_URL (secret)" "${DEPLOY_ALERT_WEBHOOK_FALLBACK_URL:-}"

          if (( ${#invalid[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=Invalid deploy alert configuration: ${invalid[*]}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "reason=Preflight checks passed." >> "$GITHUB_OUTPUT"

      - name: Deployment Skipped
        if: steps.preflight.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Deployment skipped."
          echo "${{ steps.preflight.outputs.reason }}"
          {
            echo "### Deploy Skipped"
            echo ""
            echo "${{ steps.preflight.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure SSH
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          scanned=0
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -p "${port}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null; then
              scanned=1
              break
            fi
            sleep 2
          done
          if [[ "${scanned}" != "1" ]]; then
            echo "ssh-keyscan did not return host key; continuing with StrictHostKeyChecking=accept-new."
          fi

      - name: Deploy Over SSH
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DEPLOY_SERVICE_NAME: ${{ vars.DEPLOY_SERVICE_NAME }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          DEPLOY_HEALTHCHECK_HOST_HEADER: ${{ vars.DEPLOY_HEALTHCHECK_HOST_HEADER }}
          DEPLOY_HEALTHCHECK_ATTEMPTS: ${{ vars.DEPLOY_HEALTHCHECK_ATTEMPTS }}
          DEPLOY_HEALTHCHECK_RETRY_DELAY_SECONDS: ${{ vars.DEPLOY_HEALTHCHECK_RETRY_DELAY_SECONDS }}
          DEPLOY_RUN_POST_DEPLOY_SMOKE: ${{ vars.DEPLOY_RUN_POST_DEPLOY_SMOKE }}
          DEPLOY_SMOKE_BASE_URL: ${{ vars.DEPLOY_SMOKE_BASE_URL }}
          DEPLOY_SMOKE_HOST_HEADER: ${{ vars.DEPLOY_SMOKE_HOST_HEADER }}
          DEPLOY_SMOKE_PATHS: ${{ vars.DEPLOY_SMOKE_PATHS }}
          DEPLOY_SMOKE_MAX_PUBLIC_LINKS: ${{ vars.DEPLOY_SMOKE_MAX_PUBLIC_LINKS }}
          DEPLOY_ENABLE_AUTO_ROLLBACK: ${{ vars.DEPLOY_ENABLE_AUTO_ROLLBACK }}
          DEPLOY_ROLLBACK_RUN_SMOKE: ${{ vars.DEPLOY_ROLLBACK_RUN_SMOKE }}
          DEPLOY_ROLLBACK_SMOKE_PATHS: ${{ vars.DEPLOY_ROLLBACK_SMOKE_PATHS }}
          DEPLOY_RUN_MIGRATION_COMPAT_CHECK: ${{ vars.DEPLOY_RUN_MIGRATION_COMPAT_CHECK }}
          DEPLOY_ALLOW_BREAKING_MIGRATIONS: ${{ vars.DEPLOY_ALLOW_BREAKING_MIGRATIONS }}
          DEPLOY_ALERT_FORMAT: ${{ vars.DEPLOY_ALERT_FORMAT }}
          DEPLOY_ALERT_NTFY_BASE_URL: ${{ vars.DEPLOY_ALERT_NTFY_BASE_URL }}
          DEPLOY_ALERT_TIMEOUT_SECONDS: ${{ vars.DEPLOY_ALERT_TIMEOUT_SECONDS }}
          DEPLOY_ALERT_ON_SUCCESS: ${{ vars.DEPLOY_ALERT_ON_SUCCESS }}
          DEPLOY_ALERT_WEBHOOK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK_URL }}
          DEPLOY_ALERT_WEBHOOK_FALLBACK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK_FALLBACK_URL }}
          DEPLOY_SSH_ATTEMPTS: ${{ vars.DEPLOY_SSH_ATTEMPTS }}
          DEPLOY_SSH_RETRY_DELAY_SECONDS: ${{ vars.DEPLOY_SSH_RETRY_DELAY_SECONDS }}
          SYSTEMCTL_USE_SUDO: ${{ vars.SYSTEMCTL_USE_SUDO }}
          ALLOW_DIRTY: ${{ vars.DEPLOY_ALLOW_DIRTY }}
          ALLOW_UNTRACKED: ${{ vars.DEPLOY_ALLOW_UNTRACKED }}
          RUN_TESTS_INPUT: ${{ github.event.inputs.run_tests }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          app_dir="${DEPLOY_APP_DIR:-/opt/mydnaobv/app}"
          branch="${DEPLOY_BRANCH:-main}"
          service_name="${DEPLOY_SERVICE_NAME:-mydnaobv}"
          healthcheck_url="${DEPLOY_HEALTHCHECK_URL:-http://127.0.0.1/}"
          healthcheck_host_header="${DEPLOY_HEALTHCHECK_HOST_HEADER:-}"
          healthcheck_attempts="${DEPLOY_HEALTHCHECK_ATTEMPTS:-6}"
          healthcheck_retry_delay_seconds="${DEPLOY_HEALTHCHECK_RETRY_DELAY_SECONDS:-5}"
          run_post_deploy_smoke="${DEPLOY_RUN_POST_DEPLOY_SMOKE:-1}"
          smoke_base_url="${DEPLOY_SMOKE_BASE_URL:-http://127.0.0.1}"
          smoke_host_header="${DEPLOY_SMOKE_HOST_HEADER:-${healthcheck_host_header}}"
          smoke_paths="${DEPLOY_SMOKE_PATHS:-}"
          smoke_max_links="${DEPLOY_SMOKE_MAX_PUBLIC_LINKS:-3}"
          enable_auto_rollback="${DEPLOY_ENABLE_AUTO_ROLLBACK:-1}"
          rollback_run_smoke="${DEPLOY_ROLLBACK_RUN_SMOKE:-1}"
          rollback_smoke_paths="${DEPLOY_ROLLBACK_SMOKE_PATHS:-}"
          run_migration_compat_check="${DEPLOY_RUN_MIGRATION_COMPAT_CHECK:-1}"
          allow_breaking_migrations="${DEPLOY_ALLOW_BREAKING_MIGRATIONS:-0}"
          deploy_alert_format="${DEPLOY_ALERT_FORMAT:-plain}"
          deploy_alert_ntfy_base_url="${DEPLOY_ALERT_NTFY_BASE_URL:-https://ntfy.sh}"
          deploy_alert_timeout="${DEPLOY_ALERT_TIMEOUT_SECONDS:-10}"
          deploy_alert_on_success="${DEPLOY_ALERT_ON_SUCCESS:-0}"
          deploy_alert_webhook_url_q="$(printf '%q' "${DEPLOY_ALERT_WEBHOOK_URL:-}")"
          deploy_alert_webhook_fallback_url_q="$(printf '%q' "${DEPLOY_ALERT_WEBHOOK_FALLBACK_URL:-}")"
          ssh_attempts="${DEPLOY_SSH_ATTEMPTS:-3}"
          ssh_retry_delay_seconds="${DEPLOY_SSH_RETRY_DELAY_SECONDS:-6}"
          systemctl_use_sudo="${SYSTEMCTL_USE_SUDO:-1}"
          allow_dirty="${ALLOW_DIRTY:-0}"
          allow_untracked="${ALLOW_UNTRACKED:-1}"

          run_tests="0"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${RUN_TESTS_INPUT:-false}" == "true" ]]; then
            run_tests="1"
          fi

          for attempt in $(seq 1 "${ssh_attempts}"); do
            if ssh -o ConnectTimeout=20 -o ServerAliveInterval=20 -o StrictHostKeyChecking=accept-new -p "${port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail; \
              cd '${app_dir}'; \
              git fetch origin '${branch}'; \
              git checkout '${branch}'; \
              git pull --ff-only origin '${branch}'; \
              chmod +x ./scripts/deploy_server.sh; \
              APP_DIR='${app_dir}' \
              BRANCH='${branch}' \
              SERVICE_NAME='${service_name}' \
              SYSTEMCTL_USE_SUDO='${systemctl_use_sudo}' \
              ALLOW_DIRTY='${allow_dirty}' \
              ALLOW_UNTRACKED='${allow_untracked}' \
              RUN_TESTS='${run_tests}' \
              HEALTHCHECK_URL='${healthcheck_url}' \
              HEALTHCHECK_HOST_HEADER='${healthcheck_host_header}' \
              HEALTHCHECK_ATTEMPTS='${healthcheck_attempts}' \
              HEALTHCHECK_RETRY_DELAY_SECONDS='${healthcheck_retry_delay_seconds}' \
              RUN_POST_DEPLOY_SMOKE='${run_post_deploy_smoke}' \
              SMOKE_BASE_URL='${smoke_base_url}' \
              SMOKE_HOST_HEADER='${smoke_host_header}' \
              SMOKE_PATHS='${smoke_paths}' \
              SMOKE_MAX_PUBLIC_LINKS='${smoke_max_links}' \
              ENABLE_AUTO_ROLLBACK='${enable_auto_rollback}' \
              ROLLBACK_RUN_SMOKE='${rollback_run_smoke}' \
              ROLLBACK_SMOKE_PATHS='${rollback_smoke_paths}' \
              RUN_MIGRATION_COMPAT_CHECK='${run_migration_compat_check}' \
              ALLOW_BREAKING_MIGRATIONS='${allow_breaking_migrations}' \
              DEPLOY_ALERT_FORMAT='${deploy_alert_format}' \
              DEPLOY_ALERT_NTFY_BASE_URL='${deploy_alert_ntfy_base_url}' \
              DEPLOY_ALERT_TIMEOUT_SECONDS='${deploy_alert_timeout}' \
              DEPLOY_ALERT_ON_SUCCESS='${deploy_alert_on_success}' \
              POST_DEPLOY_ALERT_WEBHOOK_URL=${deploy_alert_webhook_url_q} \
              POST_DEPLOY_ALERT_WEBHOOK_FALLBACK_URL=${deploy_alert_webhook_fallback_url_q} \
              ./scripts/deploy_server.sh"; then
              break
            fi

            if [[ "${attempt}" -ge "${ssh_attempts}" ]]; then
              echo "Deploy failed after ${ssh_attempts} SSH attempts."
              exit 1
            fi
            echo "Deploy SSH attempt ${attempt}/${ssh_attempts} failed; retrying in ${ssh_retry_delay_seconds}s."
            sleep "${ssh_retry_delay_seconds}"
          done

      - name: Deployment Summary
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          {
            echo "### Deploy Complete"
            echo ""
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Repo: ${GITHUB_REPOSITORY}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"
