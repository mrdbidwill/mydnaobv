<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "myDNAobv" }}</title>
    <style>
      :root {
        --bg: #f6f2e7;
        --ink: #1c1b16;
        --muted: #5d5645;
        --accent: #2b6e5a;
        --accent-2: #d4a373;
        --card: #fffaf0;
        --border: #e4d8c6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Serif 4", "Iowan Old Style", "Palatino", serif;
        background: radial-gradient(circle at 10% 20%, #fffaf0, #f6f2e7 50%, #efe6d5 100%);
        color: var(--ink);
      }
      header {
        padding: 24px 20px 8px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 250, 240, 0.8);
        backdrop-filter: blur(4px);
        position: sticky;
        top: 0;
      }
      .header-inner {
        max-width: 980px;
        margin: 0 auto;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        justify-content: space-between;
      }
      .brand-block {
        min-width: 0;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 20px 60px 20px;
      }
      .brand {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .subtitle {
        color: var(--muted);
        margin-top: 6px;
      }
      .provider {
        text-align: right;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.3;
      }
      .provider a {
        color: inherit;
        text-decoration: none;
      }
      .provider-logo {
        display: block;
        height: 34px;
        width: auto;
        margin-top: 6px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        padding: 18px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .btn {
        display: inline-block;
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 10px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
      }
      .btn.secondary {
        background: #f0e2cd;
        color: var(--ink);
      }
      .input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        font-size: 14px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .muted { color: var(--muted); }
      .empty {
        padding: 20px;
        border: 1px dashed var(--border);
        border-radius: 10px;
        background: #fff;
      }
      .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
      @media (max-width: 720px) {
        .row { grid-template-columns: 1fr; }
        header { position: static; }
        .header-inner {
          flex-direction: column;
          align-items: flex-start;
        }
        .provider {
          text-align: left;
        }
      }
      .ad-slot-wrap {
        max-width: 980px;
        margin: 12px auto 0 auto;
        padding: 0 20px;
      }
      .ad-slot {
        min-height: 90px;
        display: block;
      }
    </style>
    {% if show_adsense %}
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ adsense_client_id }}" crossorigin="anonymous"></script>
    {% endif %}
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="brand-block">
          <div class="brand">myDNAobv</div>
          <div class="subtitle">DNA-confirmed fungal observations for a specific place</div>
        </div>
        <div class="provider">
          <a href="https://mrdbid.com" target="_blank" rel="noreferrer">Provided by MRDBID</a>
          <a href="https://mrdbid.com" target="_blank" rel="noreferrer">
            <img class="provider-logo" src="/static/images/mrdbid_logo.svg" alt="MRDBID" />
          </a>
        </div>
      </div>
    </header>
    {% if show_adsense and adsense_banner_slot %}
      <div class="ad-slot-wrap">
        <ins
          class="adsbygoogle ad-slot"
          style="display:block"
          data-ad-client="{{ adsense_client_id }}"
          data-ad-slot="{{ adsense_banner_slot }}"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    {% endif %}
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
